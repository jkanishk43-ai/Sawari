name: sawaari
description: Delhi multimodal fare comparison and booking app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.0.0

  # Maps
  maplibre_gl: ^1.0.0

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Networking
  dio: ^5.4.0
  graphql_flutter: ^5.1.0

  # Storage
  flutter_secure_storage: ^9.2.0
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.0

  # UI
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utilities
  flutter_animate: ^4.3.0
  intl: ^0.19.0
  uuid: ^4.3.0
  google_fonts: ^6.2.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
