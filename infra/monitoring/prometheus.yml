global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sawaari-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: api

  - job_name: comparison-orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: orchestrator

  - job_name: realtime-eta
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: eta

  - job_name: valkey
    static_configs:
      - targets: ['valkey:6379']

  - job_name: kafka
    static_configs:
      - targets: ['kafka:9092']

  - job_name: otp2
    metrics_path: /otp/actuator/prometheus
    static_configs:
      - targets: ['otp2:8080']

  - job_name: valhalla
    static_configs:
      - targets: ['valhalla:8002']

  - job_name: kong
    static_configs:
      - targets: ['kong:8001']
        labels:
          service: gateway

  - job_name: clickhouse
    static_configs:
      - targets: ['clickhouse:8123']

rule_files:
  - /etc/prometheus/rules/sawaari_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']