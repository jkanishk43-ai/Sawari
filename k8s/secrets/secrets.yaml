# Sawaari Secrets Template
# NOTE: Apply this with: kubectl apply -f secrets.yaml
# Generate base64 values with: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: sawaari-secrets
  namespace: sawaari
type: Opaque
stringData:
  # ==========================================
  # DATABASE CREDENTIALS
  # ==================================
  postgres-user: sawaari
  postgres-password: CHANGE_IN_PRODUCTION_use_kubectl_seal_or_vault
  clickhouse-user: sawaari
  clickhouse-password: CHANGE_IN_PRODUCTION_use_kubectl_seal_or_vault

  # ==========================================
  # S3 / MINIO
  # ==================================
  minio-root-user: minioadmin
  minio-root-password: CHANGE_IN_PRODUCTION_use_kubectl_seal_or_vault

  # ==========================================
  # EXTERNAL API KEYS (Fill in values)
  # ==================================
  # Uber API
  uber-client-id: ""
  uber-client-secret: ""

  # Ola API
  ola-api-key: ""

  # Rapido API
  rapido-api-key: ""

  # OTD (Open Transit Data) - Delhi
  # Register at https://otd.delhi.gov.in
  otd-api-key: ""

  # Google Maps API (for premium tile layers)
  google-maps-api-key: ""

  # Mappls/MapmyIndia
  mappls-api-key: ""

  # ==========================================
  # ONDC CREDENTIALS
  # ==================================
  ondc-gateway-url: "https://api.ondc.org"
  ondc-subscriber-id: ""
  ondc-subscriber-key: ""
  ondc-signing-private-key: ""
  ondc-encryption-public-key: ""

  # ==========================================
  # AUTHENTICATION
  # ==================================
  # JWT Secret (generate with: openssl rand -base64 32)
  jwt-secret: CHANGE_IN_PRODUCTION_generate_with_openssl_rand_base64_32

  # Firebase Cloud Messaging
  fcm-server-key: ""
  fcm-sender-id: ""

  # MSG91 SMS Gateway (for OTP)
  msg91-auth-key: ""

  # WhatsApp Business API
  whatsapp-phone-number-id: ""
  whatsapp-access-token: ""
  whatsapp-webhook-secret: ""

  # ==========================================
  # NOTIFICATION TOKENS
  # ==================================
  telegram-bot-token: ""

# ==========================================
# SECRET TEMPLATE INSTRUCTIONS
# ==================================
# 1. Copy this file: cp secrets.yaml secrets-filled.yaml
# 2. Fill in all CHANGE_IN_PRODUCTION values
# 3. For production, use:
#    - Sealed Secrets (Bitnami)
#    - HashiCorp Vault
#    - AWS Secrets Manager
#    - External Secrets Operator
#
# NEVER commit secrets-filled.yaml to version control
