# OTP2 - OpenTripPlanner Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otp2
  namespace: sawaari
  labels:
    app: otp2
    tier: transit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otp2
  template:
    metadata:
      labels:
        app: otp2
        tier: transit
    spec:
      containers:
        - name: otp2
          image: sawaari/otp2:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: otp2
          env:
            - name: OTP_GRAPH_DIR
              value: /var/otp/graphs
            - name: OTP_PORT
              value: "8080"
            - name: JAVA_OPTS
              value: "-Xmx6g -Xms2g -server -XX:+UseG1GC"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
              cpu: "2"
          volumeMounts:
            - name: otp2-graphs
              mountPath: /var/otp/graphs
          readinessProbe:
            httpGet:
              path: /otp/
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /otp/
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 60
      volumes:
        - name: otp2-graphs
          persistentVolumeClaim:
            claimName: otp2-graphs-pvc
      nodeSelector:
        topology.kubernetes.io/zone: primary  # Schedule on memory-optimized nodes
---
apiVersion: v1
kind: Service
metadata:
  name: otp2
  namespace: sawaari
  labels:
    app: otp2
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: otp2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: otp2-graphs-pvc
  namespace: sawaari
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
